<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | ZenInvestSnap</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --accent: #10b981;
            --accent-hover: #059669;
            --card-border: rgba(255, 255, 255, 0.05);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-primary);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 1rem;
        }
        .login-card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 1.5rem;
            padding: 3rem;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        .brand {
            text-align: center;
            margin-bottom: 2.5rem;
        }
        .brand h1 {
            font-size: 1.8rem;
            font-weight: 700;
        }
        .brand span { color: var(--accent); }
        
        .form-group { margin-bottom: 1rem; }
        label {
            display: block;
            margin-bottom: 0.4rem;
            color: var(--text-secondary);
            font-size: 0.875rem;
        }
        input {
            width: 100%;
            padding: 0.65rem 1rem;
            background: #0f172a;
            border: 1px solid var(--card-border);
            border-radius: 0.75rem;
            color: white;
            font-family: inherit;
        }
        input:focus {
            outline: none;
            border-color: var(--accent);
        }
        .helptext { font-size: 0.7rem; color: var(--text-secondary); margin-top: 0.2rem; }
        .errorlist { color: #ef4444; font-size: 0.75rem; list-style: none; margin-top: 0.2rem; }
        .btn {
            width: 100%;
            padding: 0.75rem;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 0.75rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
            margin-top: 1.5rem;
        }
        .btn:hover { background: var(--accent-hover); }
        
        .footer-links {
            margin-top: 2rem;
            text-align: center;
            font-size: 0.875rem;
            color: var(--text-secondary);
        }
        .footer-links a {
            color: var(--accent);
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="brand">
            <h1>Join <span>ZenInvest</span></h1>
        </div>

        <form method="post">
            {% csrf_token %}
            {% for field in form %}
            <div class="form-group">
                <label for="{{ field.id_for_label }}">{{ field.label }}</label>
                {{ field }}
                {% if field.help_text %}
                <p class="helptext">{{ field.help_text|safe }}</p>
                {% endif %}
                {% if field.errors %}
                <ul class="errorlist">
                    {% for error in field.errors %}
                    <li>{{ error }}</li>
                    {% endfor %}
                </ul>
                {% endif %}
            </div>
            {% endfor %}
            <button type="submit" class="btn">Create Account</button>
        </form>
        
        <div class="footer-links">
            Already have an account? <a href="{% url 'login' %}">Login here</a>
        </div>
    </div>
</body>
</html>
